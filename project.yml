name: MacRight
options:
  bundleIdPrefix: com.macright
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  MacRight:
    type: application
    platform: macOS
    sources:
      - path: MacRight
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macright.app
        INFOPLIST_FILE: MacRight/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacRight/MacRight.entitlements
        PRODUCT_NAME: MacRight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    dependencies:
      - target: FinderSyncExtension

  FinderSyncExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderSyncExtension
        excludes:
          - "**/.DS_Store"
          - Resources/Templates
      - path: Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - path: FinderSyncExtension/Resources/Templates
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macright.app.FinderSyncExtension
        INFOPLIST_FILE: FinderSyncExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: FinderSyncExtension/FinderSyncExtension.entitlements
        PRODUCT_NAME: FinderSyncExtension
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: YES
